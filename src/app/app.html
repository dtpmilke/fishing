<app-map />

<header class="top">
  <app-search-box class="grow" />
  <div class="actions">
    <app-notify-button />
    <app-theme-toggle />
  </div>
</header>

<div class="map-tools">
  <button type="button" class="round-btn glass" [class.on]="store.spots().length" (click)="store.findSpots()"
          [title]="store.spotsLoading() ? 'Ищу…' : 'Рыбные места рядом'" aria-label="Рыбные места рядом">
    <i class="ti" [class.ti-fish]="!store.spotsLoading()" [class.ti-loader-2]="store.spotsLoading()"
       [class.spin]="store.spotsLoading()" aria-hidden="true"></i>
  </button>
</div>

<section
  class="sheet"
  [class.open]="sheetOpen()"
  [class.dragging]="dragging()"
  [style.transform]="sheetStyle()"
>
  <button
    type="button"
    class="handle"
    (pointerdown)="onDown($event)"
    (pointermove)="onMove($event)"
    (pointerup)="onUp()"
    (pointercancel)="onUp()"
    aria-label="Свернуть или развернуть панель"
  >
    <span class="grip"></span>
  </button>

  <div class="sheet-scroll">
    <app-verdict-card />
    <app-pressure-chart />
    <app-stats-row />
    <p class="disclaimer">Прогноз ориентировочный — основан на динамике давления.</p>
  </div>
</section>
